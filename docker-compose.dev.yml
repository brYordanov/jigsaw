services:
    db:
        container_name: jigsaw-postgres
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: jigsaw
            POSTGRES_USER: root
            POSTGRES_PASSWORD: 123
            NODE_ENV: development
        ports:
            - '5435:5432'
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U root -d jigsaw']
            interval: 5s
            timeout: 3s
            retries: 20

    adminer:
        image: adminer:latest
        depends_on:
            - db
        ports:
            - '8080:8080'
        environment:
            ADMINER_DEFAULT_SERVER: db

volumes: { db_data: {} }
