services:
    db:
        container_name: jigsaw-test-db
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: jigsaw-test
            POSTGRES_USER: root
            POSTGRES_PASSWORD: 123
            NODE_ENV: test
        ports:
            - '5436:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U root -d jigsaw-test']
            interval: 5s
            timeout: 3s
            retries: 20
